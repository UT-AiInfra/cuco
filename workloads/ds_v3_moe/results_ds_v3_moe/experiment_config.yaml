    \ on the workload's data-dependency structure. You\nmust analyze the program and\
    \ decide. Here is the decision framework:\n\n### Kernel-Level Fusion\n\nFuse compute\
    \ and communication into a **single persistent kernel** when:\n  - The workload\
    \ is **iterative**: each step produces a small chunk of\n    output that another\
