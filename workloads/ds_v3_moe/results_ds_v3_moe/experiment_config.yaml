    \ one-sided network transfers to remote peers.\n\n**Constructor**:\n```cpp\nncclGin(ncclDevComm\
    \ const &comm, int contextIndex)\n```\n\n**Parameters**:\n- `comm`: Device communicator\
    \ created via `ncclDevCommCreate()`\n- `contextIndex`: Network communication channel\
    \ identifier. Multiple contexts allow spreading traffic across connections to\
    \ avoid bottlenecks.\n\n### Data Transfer Operations\n\n#### put\nExecutes a device-initiated,\
    \ one-sided data transfer from local buffer to remote buffer on a peer.\n\n**Signature**:\n\
    ```cpp\nvoid put(ncclTeam team, int peer,\n         ncclWindow_t dstWnd, size_t\
    \ dstOffset,\n         ncclWindow_t srcWnd, size_t srcOffset,\n         size_t\
    \ bytes,\n         RemoteAction remoteAction = ncclGin_None{},\n         LocalAction\
    \ localAction = ncclGin_None{},\n         Coop coop = ncclCoopThread{},\n    \
    \     DescriptorSmem descriptor = ncclGin_None{},\n         cuda::thread_scope\
    \ alreadyReleased = cuda::thread_scope_thread,\n         cuda::thread_scope expected_scope\
    \ = cuda::thread_scope_device)\n```\n\n**Key Parameters**:\n- `team`: Team handle\
    \ (e.g., from `ncclTeamWorld()`)\n- `peer`: Target peer rank within the team\n\
    - `dstWnd`, `dstOffset`: Destination window and offset\n- `srcWnd`, `srcOffset`:\
    \ Source window and offset\n- `bytes`: Number of bytes to transfer\n- `remoteAction`:\
    \ Optional signal increment on remote peer (e.g., `ncclGin_SignalInc{signalIndex}`)\n\
    - `localAction`: Optional counter increment on local peer (e.g., `ncclGin_CounterInc{counterIndex}`)\n\
    \n**Ordering Guarantee**: Visibility of attached signals implies visibility of\
    \ the put data and all preceding puts to the same peer (when using the same GIN\
    \ context).\n\n#### flush\nEnsures pending transfers are locally consumed, meaning\
    \ their source buffers are safe to reuse.\n\n**Signature**:\n```cpp\nvoid flush(Coop\
    \ coop, cuda::memory_order ord = cuda::memory_order_acquire)\n```\n\n### Signals\
    \ (Remote Actions)\n\nSignals are 64-bit integer values manipulated atomically,\
    \ used for remote notification.\nThe signal index type is a 32-bit identifier;\
    \ the signal *value* read/written is 64-bit.\n\n#### Signal Types\n- `ncclGinSignal_t`:\
    \ 32-bit signal index (`uint32_t`); the signal value is `uint64_t`\n- `ncclGin_SignalInc`:\
    \ Increment signal by 1 on remote peer\n- `ncclGin_SignalAdd`: Add specific value\
    \ to signal on remote peer\n\n#### Signal Methods\n\n**readSignal**: Read current\
    \ signal value\n```cpp\nuint64_t readSignal(ncclGinSignal_t signal, int bits =\
    \ 64,\n                    cuda::memory_order ord = cuda::memory_order_acquire)\n\
    ```\n\n**waitSignal**: Wait until signal reaches at least the specified value\n\
    ```cpp\nvoid waitSignal(Coop coop, ncclGinSignal_t signal, uint64_t least,\n \
    \               int bits = 64, cuda::memory_order ord = cuda::memory_order_acquire)\n\
    ```\n\n**resetSignal**: Reset signal to zero\n```cpp\nvoid resetSignal(ncclGinSignal_t\
    \ signal)\n```\n\n**signal**: Send standalone signal without data transfer\n```cpp\n\
    void signal(ncclTeam team, int peer, RemoteAction remoteAction,\n            Coop\
    \ coop = ncclCoopThread{},\n            DescriptorSmem descriptor = ncclGin_None{},\n\
    \            cuda::thread_scope alreadyReleased = cuda::thread_scope_thread,\n\
    \            cuda::thread_scope expected_scope = cuda::thread_scope_device)\n\
    ```\n\n**Rolling Comparison**: Signal comparisons use rolling logic to handle\
    \ unsigned overflow.\n\n### Counters (Local Actions)\n\nCounters track local completion\
    \ of operations, limited to 56-bit values.\n\n#### Counter Types\n- `ncclGinCounter_t`:\
    \ 32-bit counter index (`uint32_t`); counter values are `uint64_t` (max 56 bits\
    \ usable)\n- `ncclGin_CounterInc`: Increment counter locally on source peer\n\n\
    #### Counter Methods\n\n**readCounter**: Read current counter value\n```cpp\n\
    uint64_t readCounter(ncclGinCounter_t counter, int bits = 56,\n              \
    \       cuda::memory_order ord = cuda::memory_order_acquire)\n```\n\n**waitCounter**:\
    \ Wait until counter reaches at least the specified value\n```cpp\nvoid waitCounter(Coop\
    \ coop, ncclGinCounter_t counter, uint64_t least,\n                 int bits =\
    \ 56, cuda::memory_order ord = cuda::memory_order_acquire)\n```\n\n**resetCounter**:\
    \ Reset counter to zero\n```cpp\nvoid resetCounter(ncclGinCounter_t counter)\n\
    ```\n\n### GIN Barriers\n\n#### ncclGinBarrierSession\n**Purpose**: Network barrier\
    \ synchronization across GIN-accessible peers.\n\n**Constructors**:\n```cpp\n\
    // Rail-scoped barrier\nncclGinBarrierSession(Coop coop, ncclGin gin, ncclTeamTagRail\
    \ tag, uint32_t index)\n\n// General-purpose barrier\nncclGinBarrierSession(Coop\
    \ coop, ncclGin gin, ncclTeam team,\n                      ncclGinBarrierHandle\
    \ handle, uint32_t index)\n```\n\n**sync Method**:\n```cpp\nvoid sync(Coop coop,\
    \ cuda::memory_order order, ncclGinFenceLevel fence)\n```\n\n**Parameters**:\n\
    - `order`: Memory ordering (`cuda::memory_order_relaxed`, `cuda::memory_order_release`,\
    \ etc.)\n- `fence`: Fence level for GIN operations\n  - `ncclGinFenceLevel::Relaxed`:\
    \ The only fence level in NCCL 2.28.9\n\n### Usage Patterns\n\n#### Basic GIN\
    \ Put with Signal\n```cpp\nncclTeam world = ncclTeamWorld(devComm);\nncclGin gin\
    \ { devComm, 0 };  // context 0\n\n// Read initial signal value\nuint64_t signalValue\
    \ = gin.readSignal(signalIndex);\n\n// Issue puts to remote peers with signal\
    \ increment\nfor (int r = 0; r < world.nRanks; ++r) {\n    if (r != world.rank)\
    \ {\n        gin.put(world, r,\n                recvwin, recvOffset + world.rank\
    \ * bytes,\n                sendwin, sendOffset + r * bytes,\n               \
    \ bytes,\n                ncclGin_SignalInc{signalIndex});\n    }\n}\n\n// Wait\
    \ for all remote peers to complete their puts\ngin.waitSignal(ncclCoopCta(), signalIndex,\
    \ signalValue + numRemotePeers);\n\n// Flush to ensure source buffers can be reused\n\
    gin.flush(ncclCoopCta());\n```\n\n#### GIN Barrier Pattern (World team \u2014\
    \ general constructor)\n```cpp\n// World-team barrier requires the general constructor\
    \ (ncclTeam + ncclGinBarrierHandle).\n// There is NO convenience constructor for\
    \ ncclTeamTagWorld; only ncclTeamTagRail has one.\nncclGinBarrierSession<ncclCoopCta>\
    \ bar {\n    ncclCoopCta(),\n    gin,                          // ncclGin instance\
    \ (2nd arg)\n    ncclTeamWorld(devComm),       // ncclTeam (3rd arg)\n    devComm.railGinBarrier,\
    \       // ncclGinBarrierHandle (4th arg)\n    blockIdx.x                    //\
    \ barrier index (5th arg)\n};\n\n// Initial barrier with relaxed ordering\nbar.sync(ncclCoopCta(),\
    \ cuda::memory_order_relaxed, ncclGinFenceLevel::Relaxed);\n\n// Perform GIN operations...\n\
    \n// Final barrier with release semantics\nbar.sync(ncclCoopCta(), cuda::memory_order_release,\
    \ ncclGinFenceLevel::Relaxed);\n```\n\n#### GIN Barrier Pattern (Rail team \u2014\
    \ convenience constructor)\n```cpp\nncclGinBarrierSession<ncclCoopCta> bar {\n\
    \    ncclCoopCta(),\n    gin,                          // ncclGin instance\n \
    \   ncclTeamTagRail{},            // convenience tag\n    blockIdx.x         \
    \           // barrier index\n};\nbar.sync(ncclCoopCta(), cuda::memory_order_relaxed,\
    \ ncclGinFenceLevel::Relaxed);\n```\n\n### Setup Requirements (Host-Side)\n\n\
    Enable GIN support during communicator creation:\n```cpp\nncclDevCommRequirements\
    \ reqs;\nmemset(&reqs, 0, sizeof(reqs));\nreqs.railGinBarrierCount = /* number\
    \ needed */;\nreqs.ginSignalCount = /* number needed */;\nreqs.ginCounterCount\
    \ = /* number needed */;\nncclDevCommCreate(comm, &reqs, &devComm);\n(void)cudaGetLastError();\
    \  // MUST clear stale CUDA error left by ncclDevCommCreate\n```\n\nGIN is available\
    \ when the NCCL communicator connects ranks over InfiniBand/RoCE.\nFor intra-node\
    \ PCIe A100 GPUs, GIN uses GDAKI (GPU Direct Async Kernel-Initiated).\n\n\n##\
    \ NCCL Pure GIN Code Examples (from official AlltoAll GIN example)\n\nThese patterns\
    \ are taken from the NVIDIA NCCL repo `examples/06_device_api/02_alltoall_gin`.\n\
    Use them when evolving GIN kernels for network-based, device-initiated communication.\n\
    \n### Host-side: Device communicator creation (GIN only)\n\nCTA count must match\
    \ railGinBarrierCount for proper barrier synchronization.\n\n```cpp\n#define NCCL_DEVICE_CTA_COUNT\
    \ 1\n#define NCCL_DEVICE_THREADS_PER_CTA 512\n\nncclDevComm devComm;\nncclDevCommRequirements\
    \ reqs;\nmemset(&reqs, 0, sizeof(reqs));\nreqs.railGinBarrierCount = NCCL_DEVICE_CTA_COUNT;\
    \  // GIN barriers for network sync\nreqs.ginSignalCount = 1;                \
    \            // GIN signals for completion\nNCCLCHECK(ncclDevCommCreate(comm,\
    \ &reqs, &devComm));\n(void)cudaGetLastError();  // MUST clear stale CUDA error\
    \ left by ncclDevCommCreate\n```\n\n### Host-side: Symmetric memory and window\
    \ registration\n\nDevice API requires symmetric memory; use ncclMemAlloc and NCCL_WIN_COLL_SYMMETRIC.\n\
    \n```cpp\nvoid* d_sendbuff;\nvoid* d_recvbuff;\nncclWindow_t send_win;\nncclWindow_t\
    \ recv_win;\n\nNCCLCHECK(ncclMemAlloc(&d_sendbuff, size_bytes));\nNCCLCHECK(ncclMemAlloc(&d_recvbuff,\
    \ size_bytes));\n\nNCCLCHECK(ncclCommWindowRegister(comm, d_sendbuff, size_bytes,\
    \ &send_win, NCCL_WIN_COLL_SYMMETRIC));\nNCCLCHECK(ncclCommWindowRegister(comm,\
    \ d_recvbuff, size_bytes, &recv_win, NCCL_WIN_COLL_SYMMETRIC));\n```\n\n### Device-side:\
    \ GIN barrier (coordinate across ranks over network)\n\nGIN barriers enable cross-node\
    \ synchronization from device code. Each block uses blockIdx.x\nas its barrier\
    \ index so blocks can progress independently while coordinating with other nodes.\n\
    \n```cpp\nncclGin gin { devComm, 0 };\nncclGinBarrierSession<ncclCoopCta> bar\
    \ {\n    ncclCoopCta(),\n    gin,\n    ncclTeamWorld(devComm),\n    devComm.railGinBarrier,\n\
    \    blockIdx.x\n};\nbar.sync(ncclCoopCta(), cuda::memory_order_relaxed, ncclGinFenceLevel::Relaxed);\n\
    ```\n\n### Device-side: readSignal before puts, waitSignal after (rolling value)\n\
    \nRead initial signal value, issue puts that increment the remote signal, then\
    \ wait until\nsignal reaches initialValue + number of expected increments.\n\n\
    ```cpp\nunsigned int signalIndex = 0;\nuint64_t signalValue = gin.readSignal(signalIndex);\n\
    \n// Issue puts (each put can use ncclGin_SignalInc{signalIndex})\nfor (int r\
    \ = tid; r < devComm.nRanks; r += nthreads) {\n    gin.put(ncclTeamWorld(devComm),\
    \ r,\n            recvwin, recvoffset + devComm.rank * size,\n            sendwin,\
    \ sendoffset + r * size,\n            size, ncclGin_SignalInc{signalIndex});\n\
    }\n\n// Wait for all remote puts to complete (rolling comparison handles overflow)\n\
    gin.waitSignal(ncclCoopCta(), signalIndex, signalValue + devComm.nRanks);\ngin.flush(ncclCoopCta());\n\
    ```\n\n### Device-side: Full pure GIN kernel sketch (AlltoAll-style)\n\n```cpp\n\
    template <typename T>\n__global__ void PureGinAlltoAllKernel(ncclWindow_t sendwin,\
    \ size_t sendoffset,\n                                      ncclWindow_t recvwin,\
    \ size_t recvoffset,\n                                      size_t count, ncclDevComm\
    \ devComm) {\n    int ginContext = 0;\n    unsigned int signalIndex = 0;\n   \
    \ ncclGin gin { devComm, ginContext };\n    uint64_t signalValue = gin.readSignal(signalIndex);\n\
    \n    ncclGinBarrierSession<ncclCoopCta> bar {\n        ncclCoopCta(), gin, ncclTeamWorld(devComm),\n\
    \        devComm.railGinBarrier, blockIdx.x\n    };\n    bar.sync(ncclCoopCta(),\
    \ cuda::memory_order_relaxed, ncclGinFenceLevel::Relaxed);\n\n    int tid = threadIdx.x\
    \ + blockIdx.x * blockDim.x;\n    int nthreads = blockDim.x * gridDim.x;\n   \
    \ const size_t size = count * sizeof(T);\n\n    for (int r = tid; r < devComm.nRanks;\
    \ r += nthreads) {\n        gin.put(ncclTeamWorld(devComm), r,\n             \
    \   recvwin, recvoffset + devComm.rank * size,\n                sendwin, sendoffset\
    \ + r * size,\n                size, ncclGin_SignalInc{signalIndex});\n    }\n\
    \n    gin.waitSignal(ncclCoopCta(), signalIndex, signalValue + devComm.nRanks);\n\
    \    gin.flush(ncclCoopCta());\n}\n```\n\n### When to use pure GIN (from official\
    \ README)\n\n- Communication between ranks that cannot use LSA (e.g. different\
    \ nodes)\n- Network-based collectives in multi-node environments\n- All communication\
    \ must go through the network\n\n### Performance notes (from official README)\n\
    \n- Signal-based completion enables asynchronous operation patterns\n- Multiple\
    \ GIN contexts can improve parallel communication performance\n- CTA count must\
    \ match railGinBarrierCount for proper barrier synchronization\n\n\n## NCCL Thread\
    \ Groups (Cooperative Groups)\n\n### Overview\nThread groups specify which threads\
    \ within a CTA participate in NCCL operations.\nMany device API functions take\
    \ a cooperative group parameter.\n\n### Predefined Thread Groups\n\n**ncclCoopThread()**\
    \ - Single thread participation\n**ncclCoopWarp()** - Warp-level (32 threads)\n\
    **ncclCoopCta()** - Block-level (all threads) - **Most commonly used**\n\n###\
    \ Usage Patterns\n\n#### Full CTA Synchronization (Most Common)\n```cpp\n// Create\
    \ barrier with ncclCoopCta\nncclLsaBarrierSession<ncclCoopCta> lsaBar {\n    ncclCoopCta(),\
    \ devComm, ncclTeamLsa(devComm),\n    devComm.lsaBarrier, blockIdx.x\n};\n\n//\
    \ All threads synchronize\nlsaBar.sync(ncclCoopCta(), cuda::memory_order_release);\n\
    gin.flush(ncclCoopCta());\n```\n\n#### Leader Thread Pattern\n```cpp\n// Only\
    \ thread 0 issues operation\nif (threadIdx.x == 0) {\n    gin.put(world, peer,\
    \ dstWnd, dstOffset, srcWnd, srcOffset, bytes,\n            ncclGin_SignalInc{signalIndex},\
    \ {}, ncclCoopThread());\n}\n// All threads wait\ngin.waitSignal(ncclCoopCta(),\
    \ signalIndex, expectedValue);\n```\n\n#### Warp-Level Operations\n```cpp\n//\
    \ All 32 threads in each warp must participate when using ncclCoopWarp.\n// Do\
    \ NOT guard with `if (threadIdx.x % 32 == 0)` \u2014 that would leave\n// only\
    \ lane 0, which contradicts the warp cooperative group contract.\nint warpId =\
    \ threadIdx.x / 32;\ngin.put(world, peer + warpId, dstWnd, dstOffset,\n      \
    \  srcWnd, srcOffset, bytes,\n        ncclGin_SignalInc{signalIndex}, ncclGin_None{},\
    \ ncclCoopWarp());\n```\n\n### Custom Thread Groups\n\nImplement custom groups\
    \ by providing three methods:\n- `thread_rank()`: Thread identifier within group\n\
    - `size()`: Total threads in group\n- `sync()`: Synchronization mechanism\n\n\
    NCCL is also compatible with CUDA cooperative groups (`cooperative_groups::thread_block`,\
    \ etc.).\n\n### Guidelines\n\n- **ncclCoopCta()**: Default choice for most operations,\
    \ full block synchronization\n- **ncclCoopWarp()**: For warp-granular operations,\
    \ performance optimization\n- **ncclCoopThread()**: Single thread operations,\
    \ typically with leader thread pattern\n\n\n## NCCL Teams\n\n### Overview\nTeams\
    \ represent subsets of ranks within an NCCL communicator for scoped communication.\n\
    \n### Predefined Teams\n\n**ncclTeamWorld(devComm)** - All ranks in the communicator\
    \ (global scope)\n**ncclTeamLsa(devComm)** - Ranks accessible via load/store operations\
    \ (local GPU group)\n**ncclTeamRail(devComm)** - Ranks directly accessible over\
    \ network (rail topology)\n\n### Team Structure\n\nThe `ncclTeam` type contains:\n\
    - `nRanks`: Number of ranks in the team\n- `rank`: Current rank position within\
    \ the team (0-indexed)\n- `stride`: Spacing between ranks\n\n**Properties**:\n\
    - World and LSA teams are contiguous (stride = 1)\n- Rail teams are typically\
    \ non-contiguous (stride = LSA team size)\n\n### Usage Patterns\n\n#### Accessing\
    \ Team Properties\n```cpp\nncclTeam world = ncclTeamWorld(devComm);\nncclTeam\
    \ lsa = ncclTeamLsa(devComm);\nncclTeam rail = ncclTeamRail(devComm);\n\n// Use\
    \ team properties\nfor (int r = 0; r < world.nRanks; ++r) {\n    // Communicate\
    \ with rank r in world team\n}\n\nfor (int lp = 0; lp < lsa.nRanks; ++lp) {\n\
    \    // Access LSA peer lp\n    float* peer = (float*)ncclGetLsaPointer(window,\
    \ offset, lp);\n}\n```\n\n#### Team-Scoped GIN Operations\n```cpp\nncclTeam world\
    \ = ncclTeamWorld(devComm);\n\n// Put to specific peer in world team\ngin.put(world,\
    \ peerRank, dstWnd, dstOffset, srcWnd, srcOffset, bytes,\n        ncclGin_SignalInc{signalIndex});\n\
    ```\n\n#### Hybrid LSA + GIN Pattern\n```cpp\nncclTeam world = ncclTeamWorld(devComm);\n\
    ncclTeam lsa = ncclTeamLsa(devComm);\n\n// The LSA team is contiguous in world\
    \ rank space.\n// world.rank is this GPU's world rank; lsa.rank is this GPU's\
    \ position\n// within the LSA team. The first world rank in the LSA group is:\n\
    int lsaWorldStart = world.rank - lsa.rank;\n\n// Iterate over world, distinguish\
    \ LSA vs non-LSA peers\nfor (int r = 0; r < world.nRanks; ++r) {\n    if (r >=\
    \ lsaWorldStart && r < lsaWorldStart + lsa.nRanks) {\n        // Use LSA for this\
    \ peer (convert world rank \u2192 LSA rank)\n        int lsaPeer = r - lsaWorldStart;\n\
    \        float* peer = (float*)ncclGetLsaPointer(recvwin, offset, lsaPeer);\n\
    \        peer[idx] = data;\n    } else {\n        // Use GIN for remote peer\n\
    \        gin.put(world, r, recvwin, offset, sendwin, offset, bytes,\n        \
    \        ncclGin_SignalInc{signalIndex});\n    }\n}\n```\n\n### Guidelines\n\n\
    - **World team**: Use for global all-to-all communication or when addressing all\
    \ ranks\n- **LSA team**: Use for direct memory access within local GPU group\n\
    - **Rail team**: Use for optimized network topology communication (advanced)\n\
    \n\n---\n\n## NCCL GIN Header Files\n\n## nccl_device/gin.h \u2014 GIN Session\
    \ API (authoritative header)\n\n```cpp\n// ncclGin (alias for ncclGin_BackendMask<NCCL_GIN_BACKEND_MASK_ALL>)\n\
    //\n// Construct with: ncclGin gin(devComm, contextIndex);\n//   contextIndex\
    \ is typically 0 (must be < ginContextCount in requirements).\n\n// Completion\
    \ action types for put():\nstruct ncclGin_None {};                         //\
    \ No remote action / no local action\nstruct ncclGin_SignalAdd { ncclGinSignal_t\
    \ signal; uint64_t value; };\nstruct ncclGin_SignalInc { ncclGinSignal_t signal;\
    \ };   // Equivalent to SignalAdd{+1}\n// SignalInc: for a given signal, all operations\
    \ between successive reset()'s\n// must either all be SignalInc or all not SignalInc.\n\
    struct ncclGin_CounterInc { ncclGinCounter_t counter; };\nstruct ncclGin_DescriptorSmem\
    \ { ncclGinDescriptorSmem* descriptor; };\n\n// ---- put (window+offset variant)\
    \ ----\n// Puts bytes from local srcWnd+srcOffset to peer's dstWnd+dstOffset.\n\
    // RemoteAction: signal action on the *receiver* when put completes. Signal is\n\
    //   visible only after this put AND all preceding puts on this context to the\n\
    //   same peer have settled.\n// LocalAction: action locally when source buffer\
    \ has been consumed.\n// Coop: set of threads participating (default ncclCoopThread).\n\
    template<\n  typename RemoteAction = ncclGin_None,\n  typename LocalAction = ncclGin_None,\n\
    \  typename Coop = ncclCoopThread,\n  typename DescriptorSmem = ncclGin_None>\n\
    void put(\n  ncclTeam, int peer,\n  ncclWindow_t dstWnd, size_t dstOffset,\n \
    \ ncclWindow_t srcWnd, size_t srcOffset, size_t bytes,\n  RemoteAction = ncclGin_None{},\n\
    \  LocalAction = ncclGin_None{},\n  Coop = ncclCoopThread{},\n  DescriptorSmem\
    \ = ncclGin_None{},\n  cuda::thread_scope alreadyReleased = cuda::thread_scope_thread,\n\
    \  cuda::thread_scope expected_scope = cuda::thread_scope_device) const;\n\n//\
    \ ---- put (ncclSymPtr variant) ----\ntemplate<typename T, ...same template args...>\n\
    void put(ncclTeam, int peer,\n  ncclSymPtr<T> dstElts, ncclSymPtr<T> srcElts,\
    \ size_t nElts, ...) const;\n\n// ---- putValue (write a scalar <= 8 bytes to\
    \ remote) ----\ntemplate<typename T, typename RemoteAction=ncclGin_None, typename\
    \ Coop=ncclCoopThread, ...>\nvoid putValue(ncclTeam, int peer,\n  ncclWindow_t\
    \ dstWnd, size_t dstOffset, T value, ...) const;\n\n// ---- signal (signal without\
    \ data) ----\ntemplate<typename RemoteAction, typename Coop=ncclCoopThread, ...>\n\
    void signal(ncclTeam, int peer, RemoteAction, Coop = ncclCoopThread(), ...) const;\n\
    \n// ---- flush ----\n// All source buffers from put's from any thread in this\
    \ coop will be safe to reuse.\n// Flush does NOT guarantee that data has settled\
    \ in remote memory.\n// IMPORTANT: The Coop must match the threads that actually\
    \ issued the puts.\n//   e.g. if only thread (0,0) issued puts, use ncclCoopThread,\
    \ NOT ncclCoopCta.\ntemplate<typename Coop>\nvoid flush(Coop, cuda::memory_order\
    \ ord = cuda::memory_order_acquire) const;\n\n// ---- Signal/Counter wait ----\n\
    // Uses \"rolling\" comparison: rolling_less_equal(supplied, internal).\n// Counters\
    \ use max 56 bits. Signals use 64 bits by default.\n\nuint64_t readCounter(ncclGinCounter_t\
    \ counter, int bits=56, ...) const;\n\ntemplate<typename Coop>\nvoid waitCounter(Coop,\
    \ ncclGinCounter_t counter, uint64_t least, int bits=56, ...) const;\n\n// Signal\
    \ shadow: user-manipulable mirror of signal value.\nuint64_t* getSignalShadowPtr(ncclGinSignal_t\
    \ signal) const;\nvoid increaseSignalShadow(ncclGinSignal_t signal, uint64_t delta)\
    \ const;\n\nuint64_t readSignal(ncclGinSignal_t signal, int bits=64, ...) const;\n\
    \n// Wait for signal to meet or exceed 'least'.\ntemplate<typename Coop>\nvoid\
    \ waitSignal(Coop, ncclGinSignal_t signal, uint64_t least, int bits=64, ...) const;\n\
    \n// Wait for signal to meet or exceed shadow value.\ntemplate<typename Coop>\n\
    void waitSignalMeetShadow(Coop, ncclGinSignal_t signal, int bits=64, ...) const;\n\
    \n// Wait until signal exceeds shadow by leastDelta, updates shadow, returns before/delta.\n\
    template<typename Coop, typename Uint>\nvoid waitSignalFollowShadow(Coop, ncclGinSignal_t\
    \ signal, Uint leastDelta,\n  Uint* before, Uint* delta, int bits=64, ...) const;\n\
    \n// Reset (sets to zero). May NOT race with concurrent modifications.\nvoid resetCounter(ncclGinCounter_t\
    \ counter) const;\nvoid resetSignal(ncclGinSignal_t signal) const;\n```\n\n\n\
    ## nccl_device/core.h \u2014 Core types, teams, windows, ncclDevComm\n\n```cpp\n\
    // Forward declarations\nstruct ncclDevComm;\nstruct ncclTeam;\n// ncclWindow_t\
    \ is defined in nccl.h\n\ntypedef uint32_t ncclGinSignal_t;\ntypedef uint32_t\
    \ ncclGinCounter_t;\n\n// ---- ncclTeam ----\nstruct ncclTeam {\n  int nRanks,\
